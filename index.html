<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBA METAVERSE: ASCENSION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    
    <div class="flash-overlay" id="flashOverlay"></div>

    <div class="universe">
        <h1 class="hyper-title" data-text="AMBA: OVERLORD">AMBA: OVERLORD</h1>
        
        <div class="portal-wrapper" id="portalWrapper">
            <div class="portal-ring"></div>
            <div class="portal-ring ring-reverse"></div>
            <div class="amba-frame">
                <img src="ambatukam.jpg" id="ambaGod" class="amba-asset" alt="Amba God Mode">
                <div class="glitch-slice"></div>
            </div>
        </div>

        <div class="control-panel">
            <button id="ascendBtn" class="btn-ultra">BUKA GERBANG DIMENSI!</button>
            <p class="status-text">Status Dimensi: <span id="statusLabel" class="neon-green">STABIL</span></p>
        </div>
    </div>

    <audio id="cosmicSound" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
